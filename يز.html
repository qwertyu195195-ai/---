<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عيادة الابتسامة</title>
    <style>
        body {
            font-family: 'Tahoma', sans-serif;
            margin: 0;
            background: linear-gradient(to bottom, #e0f7fa, #ffffff);
            color: #333;
        }

        header {
            background-color: #0097a7;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .hero {
            text-align: center;
            padding: 50px 20px;
        }

        .hero h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 1.2em;
            margin-bottom: 20px;
        }

        .btn {
            background-color: #0097a7;
            color: white;
            padding: 15px 25px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1.1em;
        }

        .services {
            display: flex;
            justify-content: space-around;
            padding: 40px 20px;
        }

        .service {
            width: 30%;
            background: #f1f1f1;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        footer {
            background-color: #0097a7;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>

<body>
    <header>
        <h2>عيادة الابتسامة</h2>
        <p>لرعاية أسنانك بأحدث التقنيات</p>
    </header>

    <section class="hero">
        <h1>ابتسامتك سر جمالك</h1>
        <p>احجز موعدك الآن مع أفضل الأطباء</p>
        <a href="tel:+9647700000000" class="btn">اتصل بنا</a>
    </section>

    <section class="services">
        <div class="service">
            <h3>تنظيف الأسنان</h3>
            <p>جلسات تنظيف وعناية دورية.</p>
        </div>
        <div class="service">
            <h3>تبييض الأسنان</h3>
            <p>ابتسامة أكثر إشراقاً بأحدث الأجهزة.</p>
        </div>
        <div class="service">
            <h3>زراعة الأسنان</h3>
            <p>حلول متكاملة لتعويض الأسنان المفقودة.</p>
        </div>
    </section>

    <footer>
        <p>© 2026 عيادة الابتسامة - كربلاء</p>
    </footer>
</body>

</html>
